# 任务配置格式：name|type|schedule|title|prompt|choices(optional)
# type 支持：
#   1) work_check：先让你选择状态，再输入工作内容并写入日志。
#      choices 需用分号分隔，如：选项A;选项B
#   2) info：弹出普通提醒框，无需 choices
# schedule 支持：
#   1) 秒数，例如 1800
#   2) cron 表达式，写法为 cron:分 时 日 月 周（例如 cron:0 7 * * *）
# prompt 支持使用 \n 表示换行。

work_check|work_check|300|工作状态确认|⏰ 5分钟提醒\n\n请选择你当前的工作状态：|逐步推进，继续执行;脱离正轨，马上调整
bathroom|info|5400|生理需求提醒|🚽 90分钟提醒\n\n现在起身活动一下，喝口水，然后去上厕所。|

